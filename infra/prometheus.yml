global:
  scrape_interval: 15s

# NOT a `*.yml` glob: infra/prometheus-rules/ also holds arete-alerts.test.yml
# (promtool's `input_series`/`tests` format, deliberately co-located with the
# rule file it tests). Prometheus's rule_files glob has no exclude syntax and
# refuses the ENTIRE config — not just the bad match — if any matched file
# fails to parse as a rule group (confirmed: "field rule_files not found in
# type rulefmt.RuleGroups" from the test file matching *.yml). Listing the
# real rule file explicitly avoids that trap while still living in the same
# directory the plan specified.
rule_files:
  - /etc/prometheus/rules/arete-alerts.yml

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
