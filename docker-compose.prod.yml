# Local "prod-like" run of all three Areté services from their production
# Dockerfiles, wired to Postgres/Redis. This is NOT deployed anywhere — it
# exists to prove the three images build, start, and can reach each other
# and the database, using the same artifacts CI/deploy would build.
#
# It intentionally does not touch infra/docker-compose.yml (the dev compose
# file); that one is still what `pnpm infra:up` / local `tsx`+`next dev` use.
#
# Usage (from the repo root):
#
#   docker compose -f docker-compose.prod.yml up -d postgres redis
#   docker compose -f docker-compose.prod.yml run --rm migrate
#   docker compose -f docker-compose.prod.yml build dashboard   # needs the
#     migrated postgres above reachable at build time (see packages/dashboard/
#     Dockerfile) — that's why dashboard's build.network is "host" and its
#     DATABASE_URL build arg defaults to localhost:5432, matching postgres's
#     published port.
#   docker compose -f docker-compose.prod.yml up -d
#
# (`docker compose ... up --build` also works, but remember dashboard's build
# needs postgres already migrated and reachable — build steps do not respect
# depends_on ordering.)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: arete
      POSTGRES_PASSWORD: arete
      POSTGRES_DB: arete
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arete"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-off migration runner. Reuses the webhook image's pre-prune "build"
  # stage (full devDependencies, including the Prisma CLI) instead of a
  # dedicated Dockerfile — run with `docker compose ... run --rm migrate`.
  migrate:
    build:
      context: .
      dockerfile: packages/webhook/Dockerfile
      target: build
    environment:
      DATABASE_URL: postgresql://arete:arete@postgres:5432/arete
    command: ["pnpm", "--filter", "@arete/db", "exec", "prisma", "migrate", "deploy"]
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["tools"]

  agents:
    build:
      context: packages/agents
      dockerfile: Dockerfile
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DATABASE_URL: postgresql://arete:arete@postgres:5432/arete
      REDIS_URL: redis://redis:6379
      # Phase 2 Task 8: add_project_memory posts back to the webhook's
      # token-guarded POST /internal/memory (arete_agents/tools/memory.py).
      # Without these the tool cannot persist anything and reports an honest
      # failure on every call -- the feature is inert (review finding B5).
      # Phase 3: the shared credential is now a signed, short-lived, rotatable
      # keyset (packages/internal-token / arete_agents/internal_token.py)
      # instead of the retired single-literal INTERNAL_API_TOKEN. The SAME
      # keyset JSON also guards this service's own POST surface
      # (arete_agents/internal_auth.py), fail-closed 503 when unset, so it is
      # required in BOTH directions. Rotation/revocation:
      # docs/ops/internal-token-rotation.md.
      WEBHOOK_SERVICE_URL: http://webhook:3000
      INTERNAL_TOKEN_SIGNING_KEYS: ${INTERNAL_TOKEN_SIGNING_KEYS:-}
      INTERNAL_TOKEN_ACTIVE_KID: ${INTERNAL_TOKEN_ACTIVE_KID:-}
      INTERNAL_TOKEN_TTL_SECONDS: ${INTERNAL_TOKEN_TTL_SECONDS:-}
    ports:
      - "8000:8000"
    volumes:
      # Persist the per-installation clone cache + codebase-memory-mcp on-disk
      # index (both live under /app/.data, per the Dockerfile) so the code
      # graph survives restarts and stays queryable by /context-map/graph
      # outside a live review. The foundation deliberately used no volume; the
      # Sensorium graph endpoint needs the index to outlast the review.
      - agents_context_map:/app/.data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  webhook:
    build:
      context: .
      dockerfile: packages/webhook/Dockerfile
    environment:
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_PRIVATE_KEY: ${GITHUB_PRIVATE_KEY:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      GITLAB_ACCESS_TOKEN: ${GITLAB_ACCESS_TOKEN:-}
      GITLAB_WEBHOOK_SECRET: ${GITLAB_WEBHOOK_SECRET:-}
      GITLAB_URL: ${GITLAB_URL:-https://gitlab.com}
      PYTHON_SERVICE_URL: http://agents:8000
      DATABASE_URL: postgresql://arete:arete@postgres:5432/arete
      # Guards this service's own /internal/* surface (internal-auth.ts) AND
      # is presented outbound to the agents service's guarded POST endpoints
      # (internalAuthHeaders()). Signed, short-lived keyset (Phase 3) —
      # unset/unparseable == both directions fail closed with 503.
      INTERNAL_TOKEN_SIGNING_KEYS: ${INTERNAL_TOKEN_SIGNING_KEYS:-}
      INTERNAL_TOKEN_ACTIVE_KID: ${INTERNAL_TOKEN_ACTIVE_KID:-}
      INTERNAL_TOKEN_TTL_SECONDS: ${INTERNAL_TOKEN_TTL_SECONDS:-}
      # Dedicated static credential the webhook VERIFIES for the one hop it
      # doesn't originate (Alertmanager -> POST /alerts/incoming,
      # alertmanager-auth.ts). Not part of the signed-token keyset above --
      # Alertmanager cannot mint a JWT. This compose file has no Alertmanager
      # service of its own (that lives in infra/docker-compose.yml); this
      # entry only lets the webhook verify a token presented by whatever
      # Alertmanager instance is configured to reach it.
      ALERTMANAGER_INGEST_TOKEN: ${ALERTMANAGER_INGEST_TOKEN:-}
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      agents:
        condition: service_started

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    environment:
      CLICKHOUSE_DB: superlog
      CLICKHOUSE_USER: superlog
      CLICKHOUSE_PASSWORD: superlog
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_prod_data:/var/lib/clickhouse
      # Mount the schema so it runs on init
      - ./packages/db/clickhouse/schema/ha-replicated-otel.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
      network: host
      args:
        DATABASE_URL: postgresql://arete:arete@localhost:5432/arete
    environment:
      DATABASE_URL: postgresql://arete:arete@postgres:5432/arete
      NODE_ENV: production
      # Presented to the agents service's guarded /chat (agent-chat.ts) as a
      # signed, short-lived internal token (Phase 3 keyset).
      PYTHON_SERVICE_URL: http://agents:8000
      INTERNAL_TOKEN_SIGNING_KEYS: ${INTERNAL_TOKEN_SIGNING_KEYS:-}
      INTERNAL_TOKEN_ACTIVE_KID: ${INTERNAL_TOKEN_ACTIVE_KID:-}
      INTERNAL_TOKEN_TTL_SECONDS: ${INTERNAL_TOKEN_TTL_SECONDS:-}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_prod_data:
  redis_prod_data:
  clickhouse_prod_data:
  agents_context_map:
