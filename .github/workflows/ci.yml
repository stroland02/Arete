name: CI

on:
  push:
    branches: [main, develop, integration-preview]
  pull_request:
    branches: [main, integration-preview]

jobs:
  test-agents:
    name: Python Agents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev
        working-directory: packages/agents

      - name: Lint
        run: uv run ruff check src/ tests/
        working-directory: packages/agents

      - name: Test
        run: uv run pytest tests/ --ignore=tests/test_e2e_smoke.py -v
        working-directory: packages/agents
        env:
          LLM_PROVIDER: gemini
          GEMINI_API_KEY: test-key-not-real

  test-webhook:
    name: TypeScript Webhook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # @arete/webhook imports the generated Prisma client from @arete/db.
      # `pnpm install` already triggers @arete/db's `prepare` script (prisma
      # generate + tsc), but this step makes that dependency explicit and
      # keeps CI green even if the lifecycle hook is ever skipped (e.g. by a
      # future --ignore-scripts install).
      - name: Build @arete/db (prisma generate)
        run: pnpm --filter @arete/db build

      - name: Type check
        run: pnpm lint
        working-directory: packages/webhook

      # Compiles src/ to dist/ with the real ESM tsconfig (module/moduleResolution
      # "nodenext"). `tsc` exiting 0 only proves the types check out — it does
      # NOT prove the compiled output is runnable (a CJS build with a dynamic
      # import() of an ESM-only package silently produces a require() that
      # crashes at runtime). The smoke test below is the actual verification.
      - name: Build
        run: pnpm build
        working-directory: packages/webhook

      - name: Test
        run: pnpm test
        working-directory: packages/webhook

      # Prove the compiled dist/ artifact actually runs under plain `node`
      # (not tsx/ts-node): boots past getConfig() and the dynamic import()
      # of the ESM-only @octokit packages, then serves a real HTTP request.
      - name: Smoke test compiled artifact (node dist/index.js)
        working-directory: packages/webhook
        env:
          GITHUB_APP_ID: "12345"
          GITHUB_PRIVATE_KEY: "-----BEGIN RSA PRIVATE KEY-----\ntest\n-----END RSA PRIVATE KEY-----\n"
          GITHUB_WEBHOOK_SECRET: ci-smoke-test-secret
          STRIPE_SECRET_KEY: sk_test_ci_smoke
          PORT: "3000"
        run: |
          node --import ./dist/otel.js dist/index.js &
          server_pid=$!
          trap "kill $server_pid" EXIT
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000/health; then
              echo "webhook dist/index.js served /health successfully"
              exit 0
            fi
            sleep 0.5
          done
          echo "webhook dist/index.js did not become healthy in time" >&2
          exit 1

  test-dashboard:
    name: Next.js Dashboard
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: arete
          POSTGRES_PASSWORD: arete
          POSTGRES_DB: arete
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arete"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://arete:arete@localhost:5432/arete
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database migrations
        run: pnpm --filter @arete/db migrate:deploy

      - name: Lint
        run: pnpm lint
        working-directory: packages/dashboard

      # `next build` prerenders any statically-eligible pages against the
      # database (see packages/db/README.md), so this both typechecks and
      # builds the production bundle against the Postgres service container
      # above.
      - name: Build
        run: pnpm build
        working-directory: packages/dashboard

      - name: Test
        run: pnpm test
        working-directory: packages/dashboard

  test-packages:
    name: Package ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: orchestration
            filter: "@arete/orchestration"
            commands: "typecheck test"
          - package: topology
            filter: "@arete/topology"
            commands: "typecheck test"
          - package: net-guard
            filter: "@arete/net-guard"
            commands: "typecheck test"
          - package: db
            filter: "@arete/db"
            commands: "build lint"
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run package gates
        run: |
          for cmd in ${{ matrix.commands }}; do
            pnpm --filter ${{ matrix.filter }} run "$cmd"
          done

  validate-infra:
    name: Infra config validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # `config --quiet` exits 0 even when a ${VAR} interpolation is
      # undefined (it just warns on stderr and substitutes an empty
      # string), so the exit code alone can't be trusted for that error
      # class. Capture stderr and fail explicitly if the warning appears.
      # GitHub Actions runs `run:` blocks under `bash -e`, and
      # `OUTPUT=$(failing-cmd)` is a simple command that carries the
      # failing command's exit status, so a non-`||`-guarded assignment
      # would abort the step at that line before STATUS or the stderr
      # echo ever ran. The `|| STATUS=$?` guard is exempt from errexit,
      # so the exit code is still propagated (and stderr still printed)
      # for syntax/schema/reference errors, exactly as before.
      - name: Validate default compose file
        run: |
          STATUS=0
          OUTPUT=$(docker compose -f infra/docker-compose.yml config --quiet 2>&1 >/dev/null) || STATUS=$?
          echo "$OUTPUT"
          if [ "$STATUS" -ne 0 ]; then
            exit "$STATUS"
          fi
          if echo "$OUTPUT" | grep -qi "variable is not set"; then
            echo "::error::Undefined variable interpolation in infra/docker-compose.yml"
            exit 1
          fi

      - name: Validate otel compose file
        run: |
          STATUS=0
          OUTPUT=$(docker compose -f infra/docker-compose-otel.yml config --quiet 2>&1 >/dev/null) || STATUS=$?
          echo "$OUTPUT"
          if [ "$STATUS" -ne 0 ]; then
            exit "$STATUS"
          fi
          if echo "$OUTPUT" | grep -qi "variable is not set"; then
            echo "::error::Undefined variable interpolation in infra/docker-compose-otel.yml"
            exit 1
          fi

      # Must stay pinned to the same image tag infra uses (Task 11 promotes
      # the default compose stack to the same 0.156.0 tag).
      - name: Validate collector config
        run: |
          docker run --rm \
            -v "$PWD/infra/otel-collector-config.yaml:/etc/otelcol/config.yaml" \
            otel/opentelemetry-collector-contrib:0.156.0 \
            validate --config=/etc/otelcol/config.yaml
